# ── Font list (do not edit font names, only pick a number for font_select) ────
# 1  = Consolas
# 2  = Courier New
# 3  = Lucida Console
# 4  = Lucida Sans Typewriter
# 5  = Terminal
# 6  = Cascadia Mono
# 7  = Cascadia Code
# 8  = DejaVu Sans Mono
# 9  = Ubuntu Mono
# 10 = Roboto Mono

[display]
# Font color: white, red, green, yellow, blue, magenta, cyan
font_color = red

# Font style: normal, bold, underline, bold+underline
font_style = Bold

# Font select: pick a number from the font list above (default 1 = Consolas)
font_select = 2

# Font size in points (e.g. 16, 20, 24, 28, 32)
font_size = 1

# Start line: which paragraph to start from (1 = first, 2 = second, etc.)
start_line = 1

# Top margin in pixels: blank space above the FIRST line of each paragraph only (0 = no gap)
# Converted to blank lines using font_size. e.g. top_margin=120, font_size=60 → 2 blank lines
top_margin = 0

# Line spacing in pixels: gap inserted between each line within a paragraph (0 = no gap)
# Converted to blank lines using font_size. e.g. line_spacing=60, font_size=60 → 1 blank line between lines
line_spacing = 0

# Left margin in pixels: blank space to leave from the left edge of the console (0 = no gap)
# Converted to spaces using font character width (approx half of font_size). e.g. left_margin=60, font_size=60 → 2 spaces
left_margin = 0
