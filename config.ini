[display]
# Font color: white, red, green, yellow, blue, magenta, cyan
font_color = red

# Font style: normal, bold, underline, bold+underline
font_style = italic

# Font size in points (e.g. 16, 20, 24, 28, 32)
font_size = 60

# Start line: which paragraph to start from (1 = first, 2 = second, etc.)
start_line = 1
